<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Devstral · Agent de Code</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<!-- PWA -->
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#0a0b12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agent Code">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
</head>
<body>

<div class="aurora"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div>

<header>
  <button id="toggle-fichiers" title="Explorateur de fichiers">📁</button>
  <div class="logo">🤖</div>
  <div class="titre-zone">
    <span class="t">Agent de Code</span>
    <span class="s">Devstral · function calling</span>
  </div>
  <div class="statut"><span class="dot"></span> En ligne</div>
  <button id="nouvelle" title="Nouvelle conversation">＋ Nouvelle</button>
</header>

<!-- Explorateur de fichiers (drawer) -->
<aside id="explorateur">
  <div class="exp-entete">
    <span>📂 Fichiers</span>
    <button id="rafraichir" title="Rafraîchir">⟳</button>
  </div>
  <div id="arbre"></div>
</aside>
<div id="voile-exp"></div>

<!-- Visionneuse de fichier -->
<div id="visionneuse">
  <div class="v-fenetre">
    <div class="v-entete">
      <span class="v-titre">fichier</span>
      <div class="v-actions">
        <button class="v-copier" title="Copier">Copier</button>
        <button class="v-fermer" title="Fermer">✕</button>
      </div>
    </div>
    <div class="v-corps"></div>
  </div>
</div>

<div id="chat">
  <div class="vide" id="accueil">
    <h2>👋 Prêt à coder</h2>
    <p>Demande-moi de lire, écrire ou exécuter du code. Les actions sensibles te seront soumises pour confirmation.</p>
  </div>
</div>

<div id="input-zone">
  <div class="saisie">
    <textarea id="message" rows="1" placeholder="Écris ta demande…  (Entrée pour envoyer, Maj+Entrée = nouvelle ligne)" autofocus></textarea>
    <button id="envoyer" title="Envoyer">➤</button>
  </div>
  <div class="astuce">Devstral peut faire des erreurs — vérifie les actions avant de confirmer.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
